<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buddy 12週旅程</title>
<style>
:root{
  --navy:#1F3A5F; --navy-lt:#E8EDF3; --green:#2E7D5B; --green-lt:#E3F0EA;
  --green-br:#3DA574; --orange:#E07A3F; --grey:#5A5A5A; --grey-lt:#F4F5F7;
  --line:#E2E5EA; --ink:#20242B; --white:#fff;
  --s1:#2E7D5B; --s2:#1F3A5F; --s3:#E07A3F;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;}
body{background:var(--grey-lt);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px 80px;}

/* header */
.top{background:var(--navy);color:#fff;padding:26px 0 22px;margin-bottom:0;}
.top .wrap{padding-bottom:0;}
.brand{font-size:13px;letter-spacing:.14em;color:var(--green-br);font-weight:700;margin-bottom:6px;}
.top h1{font-size:30px;font-weight:800;letter-spacing:.01em;}
.top .sub{font-size:15px;color:#B9C6D6;margin-top:6px;}
.top .pill{display:inline-block;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.22);
  border-radius:999px;padding:4px 14px;font-size:12.5px;color:#DCE6F0;margin-top:14px;}

/* view tabs */
.tabs{position:sticky;top:0;z-index:40;background:#fff;border-bottom:1px solid var(--line);
  box-shadow:0 1px 8px rgba(0,0,0,.04);}
.tabs .wrap{display:flex;gap:6px;padding-top:0;padding-bottom:0;}
.tab{appearance:none;border:0;background:none;padding:16px 20px;font-size:15px;font-weight:700;
  color:var(--grey);cursor:pointer;border-bottom:3px solid transparent;transition:.15s;white-space:nowrap;}
.tab:hover{color:var(--navy);}
.tab.on{color:var(--navy);border-bottom-color:var(--green-br);}
.tab .n{display:inline-flex;width:20px;height:20px;border-radius:50%;background:var(--green-lt);
  color:var(--green);font-size:12px;align-items:center;justify-content:center;margin-right:7px;font-weight:800;vertical-align:1px;}
.tab.on .n{background:var(--green-br);color:#fff;}

.view{display:none;padding-top:30px;}
.view.on{display:block;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

.lead{font-size:15.5px;color:var(--grey);max-width:760px;margin-bottom:26px;}
.lead b{color:var(--navy);}

/* ===== VIEW 1: journey overview ===== */
.stage-band{display:flex;gap:10px;margin-bottom:14px;}
.stage-tag{flex:1;border-radius:10px;padding:10px 14px;color:#fff;font-weight:700;font-size:14px;text-align:center;}
.phase-row{display:grid;grid-template-columns:repeat(14,1fr);gap:6px;margin-bottom:8px;}
.wk{position:relative;border:1px solid var(--line);border-radius:10px;background:#fff;padding:10px 6px;
  cursor:pointer;transition:.16s;text-align:center;min-height:92px;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;gap:4px;}
.wk:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(31,58,95,.14);border-color:var(--green-br);}
.wk .wnum{font-size:12.5px;font-weight:800;color:#fff;border-radius:6px;padding:1px 8px;line-height:1.5;}
.wk .wt{font-size:10.5px;color:var(--ink);font-weight:600;line-height:1.35;}
.wk .wc{font-size:9px;color:var(--grey);margin-top:auto;}
.wk.milestone{border-color:var(--orange);border-width:2px;box-shadow:0 2px 10px rgba(224,122,63,.18);}
.wk.bookend{background:var(--navy-lt);}
.legend{display:flex;gap:18px;flex-wrap:wrap;margin:18px 0 4px;font-size:12.5px;color:var(--grey);}
.legend span{display:inline-flex;align-items:center;gap:6px;}
.dot{width:12px;height:12px;border-radius:4px;display:inline-block;}

/* ===== VIEW 2: four services ===== */
.hub{display:grid;grid-template-columns:1fr;gap:16px;}
.svc{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;}
.svc-h{display:flex;align-items:center;gap:14px;padding:16px 20px;background:var(--green);color:#fff;}
.svc-h .ico{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.16);
  display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:800;flex-shrink:0;}
.svc-h .ti{font-size:17px;font-weight:800;}
.svc-h .fr{font-size:12.5px;color:#CDE7DA;margin-top:1px;}
.svc-b{display:grid;grid-template-columns:1fr 1fr 1.3fr;}
.svc-b>div{padding:14px 20px;border-right:1px solid var(--line);}
.svc-b>div:last-child{border-right:0;}
.svc-b .k{font-size:11.5px;font-weight:800;letter-spacing:.04em;margin-bottom:6px;text-transform:uppercase;}
.svc-b .before .k{color:var(--grey);}
.svc-b .after .k{color:var(--green);}
.svc-b .role .k{color:var(--orange);}
.svc-b p{font-size:13.5px;color:var(--ink);}
.knit{background:var(--navy);color:#fff;border-radius:14px;padding:22px 26px;margin-top:20px;}
.knit b{color:var(--green-br);}
.knit .t{font-size:16px;font-weight:800;margin-bottom:8px;}
.knit p{font-size:14px;color:#D3DEEA;}

/* ===== VIEW 3: 衛教 forms ===== */
.forms-intro{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:26px;}
.pcard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;}
.pcard .h{font-weight:800;color:var(--navy);font-size:15px;margin-bottom:6px;}
.pcard p{font-size:13px;color:var(--grey);}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fex{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
.fex .fh{padding:11px 16px;background:var(--green-lt);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:9px;}
.fex .fh .wb{font-size:11px;font-weight:800;color:#fff;background:var(--green);border-radius:5px;padding:1px 7px;}
.fex .fh .ft{font-size:13.5px;font-weight:700;color:var(--navy);}
.fex .fb{padding:14px 16px;}
.fex .form-type{display:inline-block;font-size:11px;font-weight:700;color:var(--orange);
  background:#FCEEE4;border-radius:5px;padding:2px 8px;margin-bottom:8px;}
.fex .fb p{font-size:13px;color:var(--ink);}

/* ===== modal (week detail) ===== */
.mask{position:fixed;inset:0;background:rgba(20,28,40,.55);z-index:80;display:none;
  align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;}
.mask.on{display:flex;animation:fade .2s;}
.modal{background:#fff;border-radius:16px;max-width:760px;width:100%;overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,.35);}
.mh{padding:22px 28px 18px;color:#fff;position:relative;}
.mh .mtag{font-size:12px;font-weight:700;letter-spacing:.08em;opacity:.9;}
.mh .mtitle{font-size:22px;font-weight:800;margin-top:4px;}
.mh .msub{font-size:13.5px;opacity:.92;margin-top:6px;font-weight:400;line-height:1.5;}
.mh .x{position:absolute;top:18px;right:20px;width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.18);border:0;color:#fff;font-size:20px;cursor:pointer;line-height:1;}
.mh .x:hover{background:rgba(255,255,255,.32);}
.mb{padding:22px 28px 28px;max-height:60vh;overflow-y:auto;}
.pair{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.pair .pc{border:1px solid var(--line);border-radius:10px;padding:12px 14px;}
.pair .pc .pl{font-size:11px;font-weight:800;letter-spacing:.03em;margin-bottom:4px;}
.pair .ex .pl{color:var(--green);}
.pair .nu .pl{color:var(--orange);}
.pair .pc .pd{font-size:12px;color:var(--grey);margin-bottom:4px;font-weight:600;}
.pair .pc .pa{font-size:12.5px;color:var(--ink);}
.sec{margin-bottom:18px;}
.sec .st{font-size:13.5px;font-weight:800;color:var(--navy);margin-bottom:8px;
  display:flex;align-items:center;gap:8px;}
.sec .st .si{width:20px;height:20px;border-radius:6px;background:var(--green-lt);color:var(--green);
  font-size:12px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;}
.sec ul{list-style:none;}
.sec li{font-size:13px;color:var(--ink);padding:3px 0 3px 16px;position:relative;}
.sec li:before{content:"";position:absolute;left:0;top:11px;width:5px;height:5px;border-radius:50%;background:var(--green-br);}
.hookbox{background:var(--grey-lt);border-left:3px solid var(--orange);border-radius:0 8px 8px 0;
  padding:10px 14px;font-size:12.5px;color:var(--ink);}
.buddybox{background:var(--green-lt);border-radius:10px;padding:12px 14px;font-size:13px;}
.buddybox .bl{font-weight:800;color:var(--green);margin-right:6px;}
.btns{margin-top:8px;font-size:12px;color:var(--navy);}
.btns b{color:var(--grey);}
.tp-mini{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:12.5px;margin-top:4px;}
.tp-mini .tk{font-weight:700;color:var(--navy);white-space:nowrap;}
.tp-mini .tv{color:var(--ink);}
/* ===== VIEW 4: weekly/daily runtime ===== */
.principles{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;}
.prin{border-radius:10px;padding:12px 14px;color:#fff;position:relative;overflow:hidden;}
.prin .pn{font-size:11px;font-weight:800;opacity:.85;letter-spacing:.05em;}
.prin .pt{font-size:15px;font-weight:800;margin:2px 0 4px;}
.prin .pd{font-size:11.5px;line-height:1.5;opacity:.95;}
.p1{background:#3B7A57;} .p2{background:#1F3A5F;} .p3{background:#C86B2B;} .p4{background:#7A4E8C;}
.runtime{display:grid;grid-template-columns:1.35fr 1fr;gap:26px;align-items:start;}
@media(max-width:900px){.runtime{grid-template-columns:1fr;}.principles{grid-template-columns:1fr 1fr;}}
.tl-head{display:flex;align-items:baseline;gap:12px;margin-bottom:4px;}
.tl-head .wk{font-size:12px;font-weight:800;color:#fff;background:var(--s1);border-radius:6px;padding:2px 10px;}
.tl-head h3{font-size:19px;font-weight:800;color:var(--navy);}
.tl-sub{font-size:13px;color:var(--grey);margin-bottom:18px;}
.timeline{position:relative;}
.tl-day{margin-bottom:10px;}
.tl-daylabel{font-size:12px;font-weight:800;color:var(--navy);background:var(--navy-lt);border-radius:6px;
  padding:3px 10px;display:inline-block;margin-bottom:8px;}
.msg{display:flex;gap:12px;padding:11px 13px;border:1px solid var(--line);border-radius:11px;background:#fff;
  cursor:pointer;transition:.14s;margin-bottom:8px;align-items:flex-start;}
.msg:hover{border-color:var(--green-br);box-shadow:0 5px 16px rgba(31,58,95,.1);transform:translateX(2px);}
.msg.act{border-color:var(--green-br);border-width:2px;background:var(--green-lt);}
.msg .time{font-size:12px;font-weight:800;color:var(--grey);white-space:nowrap;padding-top:1px;min-width:44px;}
.msg .body{flex:1;}
.msg .mt{font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:2px;}
.msg .mm{font-size:12px;color:var(--grey);line-height:1.5;}
.msg .tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.tag-p{font-size:10.5px;font-weight:800;color:#fff;border-radius:5px;padding:1px 7px;}
.tag-c{font-size:10.5px;font-weight:700;color:var(--grey);background:var(--grey-lt);border-radius:5px;padding:1px 7px;}
.tag-svc{font-size:10.5px;font-weight:700;border-radius:5px;padding:1px 7px;background:var(--green-lt);color:var(--green);}

/* phone */
.phone-wrap{position:sticky;top:80px;}
.phone{width:300px;margin:0 auto;background:#0B1F16;border-radius:32px;padding:12px 10px 16px;
  box-shadow:0 20px 50px rgba(0,0,0,.28);border:2px solid #0B1F16;}
.phone .notch{width:110px;height:20px;background:#0B1F16;border-radius:0 0 14px 14px;margin:0 auto 6px;}
.pscreen{background:#111C17;border-radius:22px;overflow:hidden;min-height:480px;display:flex;flex-direction:column;}
.pbar{background:#1B7A47;color:#fff;padding:12px 14px;display:flex;align-items:center;gap:9px;}
.pbar .av{width:30px;height:30px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;}
.pbar .nm{font-size:14px;font-weight:800;}
.pbar .st{font-size:10px;opacity:.85;margin-top:-2px;}
.pbody{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:10px;background:linear-gradient(180deg,#0F1A14,#0C1611);}
.pday{align-self:center;font-size:10px;color:#7FA890;background:rgba(255,255,255,.06);border-radius:10px;padding:2px 12px;}
.bmsg{align-self:flex-start;max-width:82%;background:#EAF4EE;color:#16281E;border-radius:14px 14px 14px 4px;
  padding:9px 12px;font-size:13px;line-height:1.5;box-shadow:0 1px 3px rgba(0,0,0,.15);}
.bmsg .who{font-size:10px;font-weight:800;color:#1B7A47;margin-bottom:3px;}
.pbtns{display:flex;flex-direction:column;gap:6px;align-self:flex-start;max-width:88%;width:88%;}
.pbtn{background:#fff;border:1.5px solid #1B7A47;color:#1B7A47;border-radius:20px;padding:8px 12px;
  font-size:12.5px;font-weight:700;text-align:center;}
.pquiz{align-self:flex-start;max-width:88%;background:#fff;border-radius:14px;padding:11px;box-shadow:0 1px 3px rgba(0,0,0,.15);}
.pquiz .q{font-size:12.5px;font-weight:700;color:#16281E;margin-bottom:8px;line-height:1.5;}
.pquiz .opt{border:1.5px solid #D4E4DA;border-radius:10px;padding:8px 10px;font-size:12.5px;color:#16281E;margin-bottom:6px;font-weight:600;}
.pquiz .opt:last-child{margin-bottom:0;}
.umsg{align-self:flex-end;max-width:78%;background:#1B7A47;color:#fff;border-radius:14px 14px 4px 14px;padding:8px 12px;font-size:12.5px;}
.pcaption{font-size:12px;color:var(--grey);text-align:center;margin-top:12px;font-style:italic;}
.pill-hint{display:inline-block;font-size:11.5px;color:var(--green);background:var(--green-lt);border-radius:999px;padding:4px 12px;margin-bottom:14px;font-weight:700;}

/* weekly overview table */
.wktable{width:100%;border-collapse:collapse;margin-top:8px;background:#fff;border-radius:12px;overflow:hidden;
  border:1px solid var(--line);}
.wktable th{background:var(--navy);color:#fff;font-size:12.5px;font-weight:700;padding:10px 12px;text-align:left;}
.wktable td{font-size:12.5px;padding:9px 12px;border-top:1px solid var(--line);vertical-align:top;}
.wktable tr:nth-child(even) td{background:var(--grey-lt);}
.wktable .wc{font-weight:800;color:#fff;border-radius:5px;padding:1px 8px;font-size:11px;}
.wktable .use{white-space:nowrap;}
</style>
</head>
<body>
<div class="top"><div class="wrap">
  <div class="brand">舞動陽光 × 國泰健康管理</div>
  <h1>每日衡好 Buddy ｜ 12 週健康促進數位旅程</h1>
  <div class="sub">從客戶進站到離站，把現場運動、微檢站量測、蛋白粉補充、衛教與關心，全部由一條 Buddy 數位旅程串接。</div>
  <span class="pill">肌少症高風險族群 Pilot　·　對應學術發表 BMJ Open Quality (SQUIRE 2.0)</span>
</div></div>

<div class="tabs"><div class="wrap">
  <button class="tab on" data-v="1"><span class="n">1</span>12 週旅程全貌</button>
  <button class="tab" data-v="2"><span class="n">2</span>Buddy 如何串起整個專案</button>
  <button class="tab" data-v="3"><span class="n">3</span>27 篇衛教內容地圖</button>
  <button class="tab" data-v="4"><span class="n">4</span>每週每天怎麼跑</button>
</div></div>

<div class="wrap">
<!-- VIEW CONTENT INJECTED BELOW -->
<div id="views"></div>
</div>

<div class="mask" id="mask"><div class="modal" id="modal"></div></div>

<script>
const STAGE={S1:{name:"覺醒與基礎",col:"var(--s1)"},S2:{name:"協同與強化",col:"var(--s2)"},S3:{name:"生活與持衡",col:"var(--s3)"}};

const WEEKS=[
{w:"W0",st:null,book:1,t:"Onboarding 暖身週",c:"加入·認識",col:"var(--orange)",
 sub:"活動正式開始前的暖身：讓客戶加入 Buddy、熟悉功能，Buddy 開始認識這個人。加入 Buddy＋填問卷＝旅程啟動。",
 ex:null,nu:null,
 msg:["這不是運動週，是暖身週——先讓客戶跟 Buddy 熟起來、Buddy 也開始認識客戶。","加入 Buddy＋填問卷就是旅程啟動（說明會早已辦完、加入是必然，不需再溝通）。","核心是問對 3 件事：客戶為什麼不運動、對肌少有沒有覺察、希望被怎麼陪——讓 Buddy 記住，後面 12 週才能對症溝通。"],
 hook:"參考 sustain 旅程數據：有暖身、能主動互動的旅程，留存顯著優於單向 onboarding。W0 的價值不是「發通知」，是讓 Buddy 在正式開始前就『認識這個人』，後面每一週的溝通才精準。",
 how:[["4 天暖身節奏","Day1 上傳照片、Day2 健康問答（3 大問題）、Day3 阻礙情境深挖、Day4 飲食總結——四天把 Buddy 的功能摸過一遍，純對話、不需儀器。"],["3 大問題是關鍵","阻礙（怎麼推）＋覺察（從哪個認知起點講）＋期待（用什麼語氣陪），問到這三面，Buddy 才懂這個人。"],["讓客戶先『動起來』","重點是讓客戶開始跟 Buddy 互動、熟悉功能，不是塞知識。暖身完，W1 才接得順。"]],
 open:"嗨，我是 Buddy！接下來我會陪你一起改善肌肉健康。開始前，想先認識你一下——過去想運動卻沒真的動起來，你覺得最大的卡點是什麼？",
 btn:"沒時間／沒動力／怕受傷／不知道怎麼做",
 rag:null,
 onboard:[
   ["Day 1","邀請上傳照片","體驗 Buddy 的拍照分析功能。邀請上傳一餐或自己的照片，破冰、建立飲食現況印象。"],
   ["Day 2","健康問答（3 大問題）","阻礙／覺察／期待各一題。這是 W0 的核心，讓 Buddy 記住這個人為什麼沒開始、對肌少的 awareness、想被怎麼陪。"],
   ["Day 3","運動阻礙情境深挖","延續 Day2 答案往下挖具體樣貌（如選『沒動力』→ 一忙就忘／累不想動／一個人懶得動／看不到效果就放棄），Buddy 精準記住卡點。"],
   ["Day 4","飲食總結","Buddy 回饋這幾天理解到什麼，體驗個人化建議，讓客戶感覺『它真的懂我』，暖身收尾、接軌 W1。"],
 ],
 tp:[["功能熟悉","4 天讓客戶摸過拍照、問答、對話、個人化建議"],["問卷啟動","加入＋填問卷＝旅程正式啟動"],["為 W1 鋪路","Buddy 帶著對客戶的理解進入 W1"]]},

{w:"W1",st:"S1",t:"肌肉決定生活品質",c:"課程正式啟動",col:"var(--s1)",
 sub:"第一印象週：先讓客戶「認同肌肉值得投資」，動機才立得住。",
 ex:["W1 肌肉決定你的生活品質","肌肉「用進廢退」，是可重建的組織；中年是最重要的存款期。"],

 ["W7","var(--s2)","恢復與修復","維生素 D 與鈣鎂","休息也是訓練 × 關鍵營養素","恢復日·強調休息"],

let curPhone="quiz";
let curOB="ob_d2";
function view4(){
  const SW=SAMPLES[curWeek];
  const wkBanner = curWeek==="W2"
    ? {tag:"W2 本週核心主題",col1:"var(--s1)",theme:"長肌肉要「訊號 ＋ 材料」",ex:"阻力訓練＝成長訊號",nu:"蛋白質＝蓋肌肉的材料"}
    : {tag:"W9 本週核心主題",col1:"var(--s3)",theme:"把力量用回生活",ex:"上肢訓練＝生活功能",nu:"運動後黃金比例＝補給時機"};
  let tl="";
  const lineCol={"運動":"#1F6FB2","營養":"#2E7D5B","整合":"#7A4E8C"};
  SW.days.forEach(day=>{
    tl+=`<div class="tl-day"><span class="tl-daylabel">${day.d}</span>`;
    day.items.forEach(m=>{
      const method=m.p?`<span class="tag-p" style="background:${PRIN[m.p].col}">互動：${PRIN[m.p].t}</span>`:`<span class="tag-c">系統節奏</span>`;
      const lineLabel={"運動":"運動扣題","營養":"營養扣題","整合":"主題收攏"};

      const svc=`<span class="tag-svc">${m.svc}</span>`;
      const act=(m.phone===curPhone)?' act':'';
      tl+=`<div class="msg${act}" onclick="setPhone('${m.phone}',this)">
        <div class="time">${m.t}</div>
        <div class="body"><div class="mt">${m.h}</div><div class="mm">${m.n}</div>
        <div class="tags">${linetag}${svc}${method}</div></div></div>`;
    });
    tl+=`</div>`;
  });
  const obRows=ONBOARD_DAYS.map(d=>{
    const act=(d.phone===curPhone)?' act':'';
    return `<div class="msg${act}" onclick="setPhone('${d.phone}',this)">
      <div class="time">${d.t}</div>
      <div class="body"><div class="mt">${d.h}</div><div class="mm">${d.n}</div>
      <div class="tags"><span class="tag-svc">${d.svc}</span></div></div></div>`;
  }).join("");
  return `<p class="lead"><b>精準溝通，不是硬推：Buddy 在對的時刻剛好出現，不是每天定時轟炸。</b>有課的日子多陪一點（課前後）、養成期每天提醒蛋白粉但每天換角度不複讀、衛教把本週主題講到位就停。每則都先過三關——<b>是客戶需要的嗎？對應真實動作嗎？拿掉會漏掉什麼嗎？</b>不是客戶需要的就不發。點左邊任一則看 Buddy 實際講什麼。</p>

  <div style="background:#FDF4EC;border:1px solid #F0D9C4;border-radius:14px;padding:20px 22px;margin-bottom:28px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <span style="font-size:12px;font-weight:800;color:#fff;background:var(--orange);border-radius:6px;padding:3px 11px">W0 暖身</span>
      <h3 style="font-size:18px;font-weight:800;color:var(--navy)">活動開始前：4 天 Onboarding</h3>
    </div>
    <p style="font-size:13px;color:var(--grey);margin-bottom:14px;line-height:1.6">正式 12 週前的暖身——讓客戶加入 Buddy、熟悉功能，Buddy 開始認識這個人。<b>核心是 Day2 的 3 大問題（阻礙／覺察／期待）</b>，讓 Buddy 記住「為什麼不運動」，後面每週才能對症溝通。點下方任一天看實際對話。</p>
    <div style="display:grid;grid-template-columns:1fr 300px;gap:22px;align-items:start">
      <div class="timeline">${obRows}</div>
      <div class="phone-wrap" style="position:static">
        <div class="phone"><div class="notch"></div><div class="pscreen" id="pscreen_ob"></div></div>
      </div>
    </div>
  </div>

  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <span style="font-size:13px;font-weight:800;color:var(--navy)">看哪一週：</span>
    <button onclick="setWeek('W2')" style="border:1.5px solid ${curWeek==='W2'?'var(--s1)':'var(--line)'};background:${curWeek==='W2'?'var(--s1)':'#fff'};color:${curWeek==='W2'?'#fff':'var(--grey)'};border-radius:20px;padding:6px 16px;font-size:13px;font-weight:700;cursor:pointer">W2 養成期</button>
    <button onclick="setWeek('W9')" style="border:1.5px solid ${curWeek==='W9'?'var(--s3)':'var(--line)'};background:${curWeek==='W9'?'var(--s3)':'#fff'};color:${curWeek==='W9'?'#fff':'var(--grey)'};border-radius:20px;padding:6px 16px;font-size:13px;font-weight:700;cursor:pointer">W9 精簡期</button>
    <span style="font-size:12px;color:var(--grey);margin-left:4px">← 對照養成期 vs 後期，看訊息量怎麼降下來</span>
  </div>
  <div class="runtime">
    <div>
      <div style="background:linear-gradient(135deg,#1F3A5F,#2E7D5B);border-radius:12px;padding:13px 18px;margin-bottom:14px">
        <div style="font-size:11px;font-weight:700;color:#B9D4C8;letter-spacing:.06em">${wkBanner.tag}</div>
        <div style="font-size:18px;font-weight:800;color:#fff;margin-top:2px">${wkBanner.theme}</div>
        <div style="font-size:12px;color:#CBD8E5;margin-top:4px"><span style="color:#8Fc9ea">運動</span>：${wkBanner.ex}　·　<span style="color:#9BD9BC">營養</span>：${wkBanner.nu}</div>
      </div>
      <div class="tl-head"><span class="wk" style="background:${wkBanner.col1}">${SW.wk}</span><h3>${SW.title}</h3></div>
      <div class="tl-sub">${SW.sub}</div>
      <div style="display:flex;gap:14px;margin:6px 0 14px;font-size:12px;color:var(--grey)">
        <span style="display:inline-flex;align-items:center;gap:5px"><i style="width:11px;height:11px;border-radius:3px;background:#1F6FB2;display:inline-block"></i>運動衛教（扣主題）</span>
        <span style="display:inline-flex;align-items:center;gap:5px"><i style="width:11px;height:11px;border-radius:3px;background:#2E7D5B;display:inline-block"></i>營養衛教（扣主題）</span>
        <span style="display:inline-flex;align-items:center;gap:5px"><i style="width:11px;height:11px;border-radius:3px;background:#7A4E8C;display:inline-block"></i>主題收攏</span>
      </div>
      <div class="timeline">${tl}</div>
    </div>
    <div class="phone-wrap">
      <span class="pill-hint">👆 點左側訊息，看 Buddy 實際講什麼</span>
      <div class="phone"><div class="notch"></div><div class="pscreen" id="pscreen"></div></div>
      <div class="pcaption">Buddy 對話示意（LINE 介面）</div>
    </div>
  </div>`;
}

function buildScreen(P){
  let seq=P.seq.map(s=>{
    if(s.t==="b")return `<div class="bmsg"><div class="who">${s.who}</div>${s.x.replace(/\n/g,"<br>")}</div>`;
    if(s.t==="u")return `<div class="umsg">${s.x}</div>`;
    if(s.t==="btns")return `<div class="pbtns">${s.opts.map(o=>`<div class="pbtn">${o}</div>`).join("")}</div>`;
    if(s.t==="quiz")return `<div class="pquiz"><div class="q">${s.q}</div>${s.opts.map(o=>`<div class="opt">${o}</div>`).join("")}</div>`;
    return "";
  }).join("");
  return `<div class="pbar"><div class="av">🐸</div><div><div class="nm">每日衡好 Buddy</div><div class="st">健康陪跑中</div></div></div>
    <div class="pbody"><div class="pday">${P.day}</div>${seq}</div>`;
}
function renderPhone(){
  const el=document.getElementById("pscreen");
  if(el&&PHONE[curPhone])el.innerHTML=buildScreen(PHONE[curPhone]);
  const elo=document.getElementById("pscreen_ob");
  if(elo&&OB_PHONE[curOB])elo.innerHTML=buildScreen(OB_PHONE[curOB]);
}
function setPhone(k,el){
  if(OB_PHONE[k]){ curOB=k; document.getElementById("pscreen_ob").innerHTML=buildScreen(OB_PHONE[k]); }
  else { curPhone=k; document.getElementById("pscreen").innerHTML=buildScreen(PHONE[k]); }
  document.querySelectorAll("#views .msg").forEach(m=>m.classList.remove("act"));
  if(el)el.classList.add("act");
}

function openWk(i){
  const w=WEEKS[i];const col=stageColOf(w);
  const stageName=w.milestone?"關鍵節點":(w.st?`第${w.st==='S1'?'一':w.st==='S2'?'二':'三'}階段 · ${STAGE[w.st].name}`:(w.book?"旅程頭尾":""));
  const TH=THEMES[w.w];
  let pair=TH?`
  <div style="background:linear-gradient(135deg,#1F3A5F,#2E7D5B);border-radius:12px;padding:14px 18px;margin-bottom:8px">
    <div style="font-size:11px;font-weight:700;color:#B9D4C8;letter-spacing:.06em;margin-bottom:3px">本週核心主題</div>
    <div style="font-size:19px;font-weight:800;color:#fff">${TH.theme}</div>
    <div style="font-size:12px;color:#CBD8E5;margin-top:5px">🔗 環扣：${TH.link}</div>
  </div>
  <div style="font-size:12px;color:var(--grey);margin:6px 0 8px">運動與營養一起扣住這個主題，各出重點、缺一不可：</div>
  <div class="pair">
    <div class="pc ex" style="border-top:3px solid #1F6FB2"><div class="pl" style="color:#1F6FB2">🏋️ 運動衛教 扣題重點</div><div class="pd">${w.ex?w.ex[0]:""}</div><div class="pa">${TH.ex}</div></div>
    <div class="pc nu" style="border-top:3px solid #2E7D5B"><div class="pl" style="color:#2E7D5B">🥗 營養衛教 扣題重點</div><div class="pd">${w.nu?w.nu[0]:""}</div><div class="pa">${TH.nu}</div></div>
  </div>`:"";
  let msg=`<div class="sec"><div class="st"><span class="si">1</span>這一週要溝通什麼</div><ul>${w.msg.map(m=>`<li>${m}</li>`).join("")}</ul></div>`;
  let hook=`<div class="sec"><div class="st"><span class="si">2</span>為什麼客戶要在意（痛點鉤子）</div><div class="hookbox">${w.hook}</div></div>`;
  let how=`<div class="sec"><div class="st"><span class="si">3</span>怎麼溝通：形式與方法</div><ul>${w.how.map(h=>`<li><b style="color:var(--orange)">${h[0]}</b>　${h[1]}</li>`).join("")}</ul></div>`;
  let open=`<div class="sec"><div class="st"><span class="si">4</span>Buddy 開場（push）</div><div class="buddybox"><span class="bl">Buddy：</span>${w.open}${w.btn?`<div class="btns"><b>按鈕：</b>${w.btn}</div>`:""}</div></div>`;
  let rag=w.rag?`<div class="sec"><div class="st"><span class="si">5</span>埋進 RAG 的可問問題（pull）</div><ul>${w.rag.map(r=>`<li>${r}</li>`).join("")}</ul></div>`:"";
  let onboard=w.onboard?`<div class="sec"><div class="st"><span class="si">📅</span>4 天 Onboarding 節奏</div>
    ${w.onboard.map(d=>`<div style="display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--line)">
      <div style="font-size:12px;font-weight:800;color:#fff;background:var(--orange);border-radius:6px;padding:3px 10px;height:fit-content;white-space:nowrap">${d[0]}</div>
      <div><div style="font-size:13.5px;font-weight:700;color:var(--navy);margin-bottom:2px">${d[1]}</div>
      <div style="font-size:12.5px;color:var(--grey);line-height:1.5">${d[2]}</div></div>
    </div>`).join("")}</div>`:"";
  let tp=`<div class="sec"><div class="st"><span class="si">＋</span>本週其他觸點</div><div class="tp-mini">${w.tp.map(t=>`<div class="tk">${t[0]}</div><div class="tv">${t[1]}</div>`).join("")}</div></div>`;
  document.getElementById("modal").innerHTML=`
    <div class="mh" style="background:${col}">
      <button class="x" onclick="closeWk()">×</button>
      <div class="mtag">${w.w}　${stageName}</div>
      <div class="mtitle">${w.t}</div>
      <div class="msub">${w.sub}</div>
    </div>
    <div class="mb">${pair}${msg}${hook}${onboard}${how}${open}${rag}${tp}</div>`;
  document.getElementById("mask").classList.add("on");
}
function closeWk(){document.getElementById("mask").classList.remove("on");}
document.getElementById("mask").addEventListener("click",e=>{if(e.target.id==="mask")closeWk();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeWk();});

function setWeek(wk){
  curWeek=wk;
  // pick a sensible default phone for the week
  curPhone = wk==="W2" ? "quiz" : "w9_trend";
  render(4);
}
function render(v){
  document.getElementById("views").innerHTML=v===1?view1():v===2?view2():v===3?view3():view4();
  if(v===4)renderPhone();
}
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on");
  render(+t.dataset.v);
  window.scrollTo({top:0,behavior:"smooth"});
}));
render(1);
</script>
